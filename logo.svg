<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40">
  <style>
    .name { font-family: "Courier New", monospace; font-size: 26px; font-weight: 700; fill: #111; }
    .dot  { font-family: "Courier New", monospace; font-size: 26px; font-weight: 700; fill: #f59e0b; }
    .ext  { font-family: "Courier New", monospace; font-size: 26px; font-weight: 700; fill: #bbb; }
    @media (prefers-color-scheme: dark) {
